<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report sick animal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="back_img">
        <div id="report-sick-animal" class="main_div">
        <h2>Report a Sick Animal</h2>
            <form  action="https://docs.google.com/forms/d/e/1FAIpQLSfXh9zFF4ZJXpW9t-LH_V8yGA6TK2qfzTS9TcdqSzcRSZmnDQ/viewform" target="_blank" method="POST">
               <div class="form_content">
                <div class="location">
                    <label for="location">Location:</label>
                    <input class="inp_loc" type="text" id="location" name="location" required>
                </div>
                <div>
                      <label for="photo">Upload Photo:</label>
                    <input class="inp_pho" type="file" id="photo" name="photo" required>
                </div>
                <div>
                      <label for="description">Description:</label>
                    <textarea class="txt_area" id="description" name="description" rows="4" required></textarea>
                </div>
                
                    

                  

                  

                    <button class="submit btn" type="submit">Submit Report</button>
               </div> 
               
            </form>
        </div>
    </div>
     

</body>
</html>
