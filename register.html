<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register a doctor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="back_img">
     <div id="register-doctor " class="main_div register_doc">
        <h2>Register a Doctor</h2>
        <form id="doctor-form">
        <div class="form_content">
            <div class="reg1">
                 <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            </div>
            <div class="reg2">
                     <label for="clinic">Clinic Name:</label>
            <input type="text" id="clinic" name="clinic" required>
            </div>
            <div class="reg3">
                 <label for="city">City:</label>
            <input type="text" id="city" name="city" required>
            </div>
            <div class="reg4">
                 <label for="contact">Contact Info:</label>
            <input type="text" id="contact" name="contact" required>

            </div>
           

       

           

           
            <button class="btn" type="submit">Register</button>
        </div>
           
        </form>
    </div>
</div>
 <script>
        document.getElementById("doctor-form").addEventListener("submit", function(event) {
            event.preventDefault();
            // You can send the form data to Google Sheets using Google Apps Script or Firebase
            alert("Doctor registered successfully!");
        });
</script>
</body>

</html>
